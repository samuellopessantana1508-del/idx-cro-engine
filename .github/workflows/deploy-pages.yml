name: Deploy web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Validate build variables
        run: |
          test -n "$VITE_SUPABASE_URL" || (echo "::error::Missing GitHub variable VITE_SUPABASE_URL" && exit 1)
          test -n "$VITE_SUPABASE_ANON_KEY" || (echo "::error::Missing GitHub variable or secret VITE_SUPABASE_ANON_KEY" && exit 1)
          test -n "$VITE_PUBLIC_REDIRECT_BASE" || (echo "::error::Missing GitHub variable VITE_PUBLIC_REDIRECT_BASE" && exit 1)
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://tykeycwworjtfpssjevw.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_H6HNEnMsY4T53ghQE-D8UQ_FRU4L98E' }}
          VITE_PUBLIC_REDIRECT_BASE: ${{ vars.VITE_PUBLIC_REDIRECT_BASE || vars.VITE_SUPABASE_URL || 'https://tykeycwworjtfpssjevw.supabase.co' }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'https://tykeycwworjtfpssjevw.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY || 'sb_publishable_H6HNEnMsY4T53ghQE-D8UQ_FRU4L98E' }}
          VITE_PUBLIC_REDIRECT_BASE: ${{ vars.VITE_PUBLIC_REDIRECT_BASE || vars.VITE_SUPABASE_URL || 'https://tykeycwworjtfpssjevw.supabase.co' }}
          VITE_REDIRECT_PATH_PREFIX: ${{ vars.VITE_REDIRECT_PATH_PREFIX || '/functions/v1/go' }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
